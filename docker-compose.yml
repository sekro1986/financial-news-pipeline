services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: masignals
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masignals}
      POSTGRES_DB: masignals
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masignals"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  poller:
    build: .
    command: python -m ma_signals.poller
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://masignals:${POSTGRES_PASSWORD:-masignals}@db:5432/masignals
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn ma_signals.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://masignals:${POSTGRES_PASSWORD:-masignals}@db:5432/masignals
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
